<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful — ViralTrack</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' rx='6' fill='%236366f1'/><path d='M13 2L3 14h9l-1 8 10-12h-9l1-8z' fill='white' stroke='none'/></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0a0a0b; --text: #f2f2f7; --sub: #aeaeb2; --accent: #6366f1; --accent2: #818cf8; --green: #30d158; --border: rgba(255,255,255,0.07); }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px; }
    .card { background: #111113; border: 1px solid var(--border); border-radius: 24px; padding: 56px 48px; max-width: 480px; width: 100%; }
    .icon { width: 72px; height: 72px; background: rgba(48,209,88,0.12); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 32px; }
    h1 { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 12px; }
    p { font-size: 16px; color: var(--sub); line-height: 1.7; margin-bottom: 32px; }
    .btn { display: inline-block; background: var(--accent); color: #fff; padding: 14px 32px; border-radius: 10px; font-size: 16px; font-weight: 600; text-decoration: none; transition: background 0.2s; }
    .btn:hover { background: #4f46e5; }
    .note { font-size: 13px; color: var(--sub); margin-top: 20px; }
    .note a { color: var(--accent2); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>You're in.</h1>
    <p>Your ViralTrack subscription is active. Check your email for login details — we'll have your account ready within a few minutes.</p>
    <a href="/login" class="btn">Go to Dashboard →</a>
    <p class="note">Questions? Email <a href="mailto:support@viraltrack.org">support@viraltrack.org</a></p>
  </div>
</body>
</html>
