<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viral Tracker — Creator Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- MOBILE TOP BAR (visible only on phones) -->
  <div class="mobile-topbar" id="mobile-topbar">
    <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Open navigation">&#9776;</button>
    <div class="mobile-topbar-logo">
      <div class="mobile-topbar-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
      </div>
      <span class="mobile-topbar-title">Viral<span class="logo-accent">Track</span></span>
    </div>
  </div>

  <!-- SIDEBAR OVERLAY BACKDROP -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div id="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-title">Viral<span class="logo-accent">Track</span></span>
          <span class="logo-sub">Creator Intelligence</span>
        </div>
      </div>

      <div class="nav-label">Navigation</div>
      <nav class="nav" id="main-nav">
        <!-- populated by applyRoleNav() after /api/me resolves -->
      </nav>

      <!-- Client workspace switcher — visible to managers/admins only -->
      <div id="client-switcher" style="display:none;padding:8px 10px 0">
        <div class="nav-label" style="padding-bottom:4px">Workspace</div>
        <select id="client-select" class="agent-select" style="width:100%;font-size:12px;padding:6px 10px"></select>
      </div>

      <div class="nav-label" style="margin-top:12px">Actions</div>
      <div class="sidebar-ops">
        <button id="poll-btn" class="btn-poll">
          <span class="poll-icon">&#9654;</span>
          Execute Scan
        </button>
        <div class="poll-status" id="poll-status"></div>
      </div>

      <div class="sidebar-footer">
        <div class="operator-info" id="operator-info" style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)">
          <div style="font-size:10px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px">Operator</div>
          <div style="font-size:13px;font-weight:500;color:var(--text-main);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="operator-name">—</div>
          <div style="margin-top:4px"><span id="operator-role" class="role-badge"></span></div>
          <a href="/auth/logout" style="display:inline-block;margin-top:5px;font-size:11px;color:var(--text-dim);transition:color 0.2s" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text-dim)'">Sign out</a>
        </div>
        <div class="sys-status">
          <span class="status-dot active"></span>
          <span class="status-text">System Online</span>
        </div>
        <div class="sys-time" id="sys-time"></div>
        <button class="theme-toggle" id="theme-toggle">
          <span class="theme-toggle-icon" id="theme-icon">☀️</span>
          <span id="theme-label">Light mode</span>
        </button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">
      <div id="client-banner" class="client-workspace-banner"></div>
      <div id="page-dashboard" class="page"></div>
      <div id="page-competitors" class="page hidden"></div>
      <div id="page-agents" class="page hidden"></div>
      <div id="page-brain" class="page hidden"></div>
      <div id="page-settings" class="page hidden"></div>
      <div id="page-admin" class="page hidden"></div>
    </main>

  </div>

  <!-- MISSION STATUS BAR -->
  <footer class="mission-bar">
    <div class="mission-stat">
      <span class="ms-label">Viral Alerts</span>
      <span class="ms-value" id="bar-alerts">0</span>
    </div>
    <div class="mission-stat">
      <span class="ms-label">Unread</span>
      <span class="ms-value accent-magenta" id="bar-unread">0</span>
    </div>
    <div class="mission-stat">
      <span class="ms-label">Actioned</span>
      <span class="ms-value accent-green" id="bar-acted">0</span>
    </div>
    <div class="mission-stat">
      <span class="ms-label">Briefs</span>
      <span class="ms-value accent-cyan" id="bar-briefs">0</span>
    </div>
    <div class="mission-stat">
      <span class="ms-label">Creators</span>
      <span class="ms-value" id="bar-accounts">0</span>
    </div>
    <div class="mission-ticker">
      <span class="ticker-label">&#9654; Live</span>
      <span class="ticker-text" id="ticker-text">System ready — add creators to begin tracking</span>
    </div>
  </footer>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <!-- INTEL BRIEF MODAL -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Intel Brief</span>
        <button class="modal-close" id="modal-close">Close</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script>
    // Theme toggle (runs before app.js to avoid flash)
    (function() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
