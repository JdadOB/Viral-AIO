<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ViralTrack — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #121212;
      --bg-2:          #1C1C1E;
      --bg-3:          #2C2C2E;
      --text-main:     #F2F2F7;
      --text-sub:      #8E8E93;
      --text-dim:      #48484A;
      --accent:        #6366F1;
      --accent-hover:  #4F46E5;
      --accent-soft:   rgba(99,102,241,0.14);
      --red:           #FF453A;
      --border:        rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.15);
      --font:          'Inter', system-ui, -apple-system, sans-serif;
    }

    [data-theme="light"] {
      --bg:            #F8F9FA;
      --bg-2:          #FFFFFF;
      --bg-3:          #F1F3F5;
      --text-main:     #1C1C1E;
      --text-sub:      #6C6C70;
      --text-dim:      #AEAEB2;
      --accent:        #4F46E5;
      --accent-hover:  #4338CA;
      --accent-soft:   rgba(79,70,229,0.10);
      --red:           #DC2626;
      --border:        rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.15);
    }

    body {
      background: var(--bg);
      color: var(--text-main);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      transition: background 0.2s, color 0.2s;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 48px; height: 48px;
      background: var(--accent);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      color: #fff;
    }
    .logo-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-main);
      display: block;
    }
    .logo-accent { color: var(--accent); }
    .logo-sub {
      display: block;
      font-size: 13px;
      color: var(--text-sub);
      margin-top: 4px;
    }

    .card {
      background: var(--bg-2);
      border: 1px solid var(--border-strong);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .form-group { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-sub);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    input {
      width: 100%;
      background: var(--bg-3);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text-main);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .btn {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      margin-top: 6px;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 18px 0;
      color: var(--text-dim);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-strong);
    }

    .btn-google {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      color: var(--text-main);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-google:hover { background: var(--bg-3); border-color: var(--border-strong); }
    .btn-google.disabled {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
    }

    .error-msg {
      background: rgba(255,69,58,0.08);
      border: 1px solid rgba(255,69,58,0.25);
      border-radius: 8px;
      color: var(--red);
      font-size: 13px;
      padding: 10px 12px;
      margin-top: 10px;
      display: none;
    }
    .error-msg.show { display: block; }


    .footer-note {
      font-size: 12px;
      color: var(--text-dim);
      text-align: center;
      margin-top: 18px;
    }
    .footer-note span { color: var(--accent); }

    .theme-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      background: var(--bg-2);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      color: var(--text-sub);
      font-family: var(--font);
      font-size: 13px;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .theme-btn:hover { background: var(--bg-3); color: var(--text-main); }
  </style>
</head>
<body>

  <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">☀️ Light</button>

  <div class="container">
    <div class="logo">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
      </div>
      <span class="logo-title">Viral<span class="logo-accent">Track</span></span>
      <span class="logo-sub">Creator Intelligence Platform</span>
    </div>

    <div class="card">
      <form id="form-login" onsubmit="doLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button class="btn" type="submit" id="btn-login">Sign In</button>
        <div class="error-msg" id="login-error"></div>
      </form>

      <div class="divider">or</div>
      <button class="btn-google" id="btn-google-login" onclick="googleAuth()">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.566 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
        Continue with Google
      </button>
    </div>

    <div class="footer-note">ViralTrack <span>v1.0</span> — Secure access required</div>
  </div>

  <script>
    // Theme
    (function() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      updateThemeBtn(theme);
    })();

    function updateThemeBtn(theme) {
      const btn = document.getElementById('theme-btn');
      if (btn) btn.textContent = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeBtn(next);
    }

    // Check Google OAuth configured
    fetch('/api/google-configured').then(r => r.json()).then(d => {
      if (!d.configured) {
        document.querySelectorAll('.btn-google').forEach(b => b.classList.add('disabled'));
      }
    }).catch(() => {});

    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const err = document.getElementById('login-error');
      err.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-password').value,
          }),
        });
        const data = await res.json();
        if (data.success) { window.location.href = '/'; return; }
        err.textContent = data.error || 'Authentication failed';
        err.classList.add('show');
      } catch {
        err.textContent = 'Connection error — try again';
        err.classList.add('show');
      }
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }

    function googleAuth() {
      window.location.href = '/auth/google';
    }
  </script>
</body>
</html>
