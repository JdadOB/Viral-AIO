# fly.toml - Fly.io deployment config
app = "viral-aio-black-frost-9755"
primary_region = "iad"

[build]

[env]
  PORT = "3000"
  DB_PATH = "/data/tracker.db"

[mounts]
  source = "app_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
